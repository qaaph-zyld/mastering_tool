version: "3.8"

services:
  mastering-toolshop:
    build: .
    ports:
      - "5050:5050"
    volumes:
      - ./music_tracks:/app/music_tracks
    environment:
      - FLASK_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5050/api/genres"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
